<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Protocol | Nexus Grid Defender</title>
    <style>
        :root { --neon-blue: #00f2ff; --bg-dark: #0a0e14; }
        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            overflow: hidden; 
        }
        
        #boot-sequence { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
            z-index: 1000; 
        }
        #progress-container { 
            width: 60%; 
            height: 30px; 
            background: #111; 
            border: 2px solid var(--neon-blue); 
            margin-top: 30px; 
            overflow: hidden; 
        }
        #progress-bar { 
            height: 100%; 
            width: 0%; 
            background: linear-gradient(90deg, #00f2ff, #7df9ff); 
            transition: width 0.2s linear; 
        }

        #game-ui { display: none; }
        canvas { 
            display: block; 
            background: #0a0f1a; 
        }
        #hud { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            text-shadow: 0 0 8px #00f2ff; 
            pointer-events: none; 
            font-size: 18px;
        }
        .hidden { display: none !important; }

        #dialogue-box {
            position: absolute; 
            bottom: 12%; 
            left: 50%; 
            transform: translateX(-50%);
            width: 75%; 
            padding: 28px 35px; 
            background: rgba(0,15,35,0.96);
            border: 3px solid #00f2ff; 
            border-radius: 8px; 
            box-shadow: 0 0 40px #00f2ff; 
            z-index: 50;
            font-size: 18px;
            line-height: 1.4;
        }
        #victory-screen, #game-over {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            z-index: 100; 
            background: rgba(5,7,20,0.98); 
            border: 4px solid #00f2ff; 
            padding: 40px; 
            min-width: 520px; 
            text-align: center;
            box-shadow: 0 0 60px #00f2ff;
        }
        button {
            background: transparent;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            padding: 12px 32px;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }
        button:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 20px #00f2ff;
        }
    </style>
</head>
<body>

    <!-- BOOT -->
    <div id="boot-sequence">
        <div id="boot-text" style="font-size:22px;margin-bottom:12px;letter-spacing:2px;color:#00ff9d;">HAPPY BIRTHDAY ENGINEER CHARLES!</div>
        <div id="boot-text2" style="font-size:18px;margin-bottom:25px;letter-spacing:1px;">NEXUS GRID BOOT SEQUENCE INITIATED...</div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <p style="margin-top:15px;color:#00ff9d;">Birthday Protocol v1.337</p>
    </div>

    <!-- GAME -->
    <div id="game-ui">
        <canvas id="canvas" width="1280" height="720"></canvas>
        
        <div id="hud">
            <div>HEALTH: <span id="health-value">100</span></div>
            <div>SCORE: <span id="score-value">0</span></div>
            <div>STAGE <span id="stage-value">1</span> | WAVE <span id="wave-value">1</span></div>
        </div>

        <div id="dialogue-box" class="hidden">
            <div id="dialogue-portrait" style="font-size:48px;float:left;margin-right:20px;"></div>
            <p id="dialogue-text"></p>
            <div style="text-align:right;margin-top:15px;color:#00ff9d;">→ CLICK OR PRESS ANY KEY TO CONTINUE</div>
        </div>

        <div id="victory-screen" class="hidden">
            <h1 style="color:#00ff88;">MISSION ACCOMPLISHED</h1>
            <p id="victory-text"></p>
            <button onclick="location.reload()">PLAY AGAIN</button>
        </div>

        <div id="game-over" class="hidden">
            <h1 style="color:#ff3366;">GRID FAILURE</h1>
            <p id="final-score"></p>
            <p id="final-wave"></p>
            <button onclick="location.reload()">RESTART MISSION</button>
        </div>
    </div>

    <script>
        let canvas, ctx, player, entityManager, keys = {}, lastTime = 0;
        let score = 0, currentStage = 1, currentWave = 1, gameRunning = true;
        let dialogueActive = false;
        let audioContext, doubleShot = 0;
        let powerUps = [];
        let boss = null;

        function showDialogue(text, portrait = "⚡", callback = null) {
            dialogueActive = true;
            const box = document.getElementById('dialogue-box');
            box.classList.remove('hidden');
            document.getElementById('dialogue-portrait').textContent = portrait;
            const textEl = document.getElementById('dialogue-text');
            textEl.textContent = "";
            let i = 0;
            const type = () => {
                if (i < text.length) {
                    textEl.textContent += text[i++];
                    setTimeout(type, 32);
                }
            };
            type();
            setTimeout(() => {
                dialogueActive = false;
                box.classList.add('hidden');
                if (callback) callback();
            }, text.length * 38 + 900);
        }

        class EntityManager {
            constructor() { this.entities = []; }
            add(e) { if (e) this.entities.push(e); }
            update(dt) {
                for (let i = this.entities.length - 1; i >= 0; i--) {
                    const e = this.entities[i];
                    if (e && e.update) e.update(dt);
                }
                this.entities = this.entities.filter(e => e && e.active !== false);
            }
            draw(ctx) { 
                for (let e of this.entities) {
                    if (e && e.draw) e.draw(ctx);
                }
            }
            clear() { this.entities = []; }
        }

        class Projectile {
            constructor(x, y, tx, ty, speed = 580) {
                this.x = x || 0;
                this.y = y || 0;
                this.radius = 7;
                this.speed = speed;
                this.active = true;
                const d = Math.hypot((tx || 600) - this.x, (ty || 360) - this.y) || 1;
                this.vx = ((tx || 600) - this.x) / d * this.speed;
                this.vy = ((ty || 360) - this.y) / d * this.speed;
            }
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                if (this.x < -50 || this.x > 1350 || this.y < -50 || this.y > 770) this.active = false;
            }
            draw(ctx) {
                ctx.fillStyle = '#00ffcc';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ffcc';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Player {
            constructor() {
                this.x = 180; this.y = 360; this.radius = 19;
                this.speed = 290; this.health = 100; this.damage = 28;
                this.shootCooldown = 0; this.invulnerable = 0;
            }
            update(dt) {
                let dx = 0, dy = 0;
                if (keys['ArrowLeft'] || keys['a']) dx--;
                if (keys['ArrowRight'] || keys['d']) dx++;
                if (keys['ArrowUp'] || keys['w']) dy--;
                if (keys['ArrowDown'] || keys['s']) dy++;
                if (dx || dy) {
                    const l = Math.hypot(dx, dy) || 1;
                    this.x += (dx / l) * this.speed * dt;
                    this.y += (dy / l) * this.speed * dt;
                }
                this.x = Math.max(30, Math.min(1250, this.x));
                this.y = Math.max(30, Math.min(690, this.y));
                if (this.shootCooldown > 0) this.shootCooldown -= dt;
            }
            draw(ctx) {
                let drawColor = '#00f2ff';
                ctx.shadowBlur = 30; ctx.shadowColor = drawColor; ctx.fillStyle = drawColor;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
            }
            shoot(tx, ty) {
                if (this.shootCooldown > 0 || !gameRunning) return;
                const count = doubleShot > 0 ? 2 : 1;
                for (let i = 0; i < count; i++) {
                    entityManager.add(new Projectile(this.x, this.y - 10, tx, ty));
                }
                this.shootCooldown = 0.12;
            }
        }

        class AdvancedEnemy {
            constructor() {
                this.x = 700 + Math.random() * 400;
                this.y = 150 + Math.random() * 400;
                this.radius = 20;
                this.health = 45 + currentStage * 8;
                this.speed = 65 + currentWave * 6;
                this.active = true;
                this.color = '#ffaa00';
                this.angle = 0;
            }
            update(dt) {
                if (!player) return;
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.hypot(dx, dy) || 1;
                this.x += (dx / dist) * this.speed * dt;
                this.y += (dy / dist) * this.speed * dt;
                this.angle = Math.atan2(dy, dx);
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.shadowBlur = 25; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        class Boss {
            constructor() {
                this.x = 1050; this.y = 360; this.radius = 52;
                this.health = 1400; this.active = true;
            }
            update(dt) {
                this.y = 260 + Math.sin(Date.now()/300) * 160;
            }
            draw(ctx) {
                ctx.shadowBlur = 60; ctx.shadowColor = '#ff0044';
                ctx.fillStyle = '#ff0044';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
            }
        }

        function spawnWave() {
            entityManager.clear();
            powerUps = [];
            boss = null;

            if (currentStage === 5 && currentWave === 5) {
                boss = new Boss();
                return;
            }

            const count = Math.min(12, 6 + currentWave * 2);
            for (let i = 0; i < count; i++) {
                entityManager.add(new AdvancedEnemy());
            }
        }

        function gameLoop(ts) {
            if (!lastTime) lastTime = ts;
            const dt = Math.min((ts - lastTime)/1000, 0.1);
            lastTime = ts;

            if (!gameRunning || dialogueActive || !player) {
                requestAnimationFrame(gameLoop);
                return;
            }

            player.update(dt);
            entityManager.update(dt);

            // Draw
            ctx.fillStyle = '#0a0f1a';
            ctx.fillRect(0, 0, 1280, 720);
            player.draw(ctx);
            entityManager.draw(ctx);
            if (boss) boss.draw(ctx);

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('boot-sequence').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';

            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');

            player = new Player();
            entityManager = new EntityManager();

            window.addEventListener('keydown', e => keys[e.key] = true);
            window.addEventListener('keyup', e => delete keys[e.key]);

            canvas.addEventListener('click', e => {
                if (!dialogueActive && gameRunning && player) {
                    const r = canvas.getBoundingClientRect();
                    player.shoot(e.clientX - r.left, e.clientY - r.top);
                }
            });

            setTimeout(() => {
                showDialogue("The Nexus Grid has been corrupted by Blackout.", "🛠️", () => {
                    showDialogue("Stage 1 starting...", "🔋", () => {
                        spawnWave();
                        requestAnimationFrame(gameLoop);
                    });
                });
            }, 500);
        }

        window.onload = () => {
            let p = 0;
            const bar = document.getElementById('progress-bar');
            const int = setInterval(() => {
                p += 2;
                if (p > 100) p = 100;
                bar.style.width = p + '%';
                if (p >= 100) {
                    clearInterval(int);
                    setTimeout(startGame, 300);
                }
            }, 160);
        };
    </script>
</body>
</html>
