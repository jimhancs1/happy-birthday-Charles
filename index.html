<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Circuit Defender | Birthday Protocol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="boot-screen">
        <h1 id="greeting">HAPPY BIRTHDAY, ENGINEER!</h1>
        <p>System Initializing...</p>
        <div class="progress-container"><div id="progress"></div></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="ui" style="display:none;">
        Score: <span id="score">0</span> | HP: <span id="hp">100</span> | Wave: <span id="wave">1</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
